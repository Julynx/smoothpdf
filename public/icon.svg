<svg xmlns="http://www.w3.org/2000/svg" viewBox="31 31 450 450" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2b" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
    
    <!-- Wave Gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C" />
      <stop offset="100%" stop-color="#FF4B2B" />
    </linearGradient>

    <!-- Document Gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e6e6e6" />
    </linearGradient>

    <!-- Drop Shadow for Document -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Fold over shadow -->
    <filter id="foldShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="-4" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Background App Icon Shape -->
  <rect x="32" y="32" width="448" height="448" rx="104" ry="104" fill="url(#bgGrad)" stroke="#3f3f40" stroke-width="2"/>

  <!-- Document Shape -->
  <g filter="url(#shadow)" transform="translate(136, 116)">
    <!-- Base paper -->
    <path d="M 0 24 
             C 0 10.745 10.745 0 24 0 
             L 160 0 
             L 240 80 
             L 240 256 
             C 240 269.255 229.255 280 216 280 
             L 24 280 
             C 10.745 280 0 269.255 0 256 
             Z" fill="url(#docGrad)" />

    <!-- A smooth S curve representing 'Smooth PDF' -->
    <path d="M 170 90 
             C 170 40, 70 40, 70 90 
             C 70 140, 170 140, 170 190 
             C 170 240, 70 240, 70 190" 
          fill="none" 
          stroke="url(#waveGrad)" 
          stroke-width="28" 
          stroke-linecap="round" />
          
    <!-- Folded corner with shadow -->
    <g filter="url(#foldShadow)">
      <path d="M 160 0 L 160 56 C 160 69.255 170.745 80 184 80 L 240 80 Z" fill="#ffffff" />
    </g>
  </g>
</svg>
